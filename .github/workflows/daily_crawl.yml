name: Daily Crawl

on:
  schedule:
    - cron: "7 1 * * *"   # 매일 UTC 01:07 = KST 10:07 (올리브영·다이소몰·카카오 선물하기 랭킹이 매일 오전 10시경 갱신되므로, 그 이후에 돌아야 그날 실제 랭킹을 정확히 수집함. health-trend 09:13 수집보다는 늦어져서 항상 전일 데이터로 표시되지만 그게 실제로 맞는 데이터임)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run crawler
        run: python main.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "data: $(date +'%Y-%m-%d') 수집"
          git pull --rebase
          git push

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
